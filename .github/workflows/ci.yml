name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint & type-check
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-PyYAML

      - name: Ruff lint
        run: ruff check src/ eval/ inference/ --select E,W,F,I --ignore E501

      - name: Mypy type check
        run: mypy src/model.py src/tokenizer.py --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # informational — don't block on first-pass type coverage

  # ─────────────────────────────────────────────────────────────────────────
  # Model smoke test (CPU, no real data required)
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Model Smoke Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install sentencepiece

      - name: Run model forward-pass smoke test
        run: python src/model.py

      - name: Verify tokenizer module imports cleanly
        run: python -c "from src.tokenizer import IndicTokenizer, train_tokenizer; print('tokenizer OK')"

      - name: Verify preprocess module imports cleanly
        run: python -c "from src.preprocess import IndicTextCleaner, QualityFilter; print('preprocess OK')"
